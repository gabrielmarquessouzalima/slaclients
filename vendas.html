<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Cliente - Loja Gabriel</title>
    <style>
        :root { --primary: #8e44ad; --dark: #1a1a2e; --light: #f4f7f6; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; }
        
        /* Menu Superior */
        nav { background: var(--dark); padding: 15px; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        nav button { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        nav button:hover, nav button.active-btn { background: var(--primary); border-color: var(--primary); }

        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .section { display: none; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo da Loja */
        .grid-vendas { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 10px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: scale(1.02); }
        .price { color: var(--success); font-weight: bold; font-size: 1.2rem; display: block; margin: 10px 0; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Estilo Histórico e Perfil */
        .info-box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .logout { color: #e74c3c; cursor: pointer; text-decoration: underline; background: none; border: none; margin-top: 20px; }
    </style>
</head>
<body>

<nav id="menu">
    <button onclick="changeTab('vendas')" id="btn-vendas" class="active-btn">🛒 Loja</button>
    <button onclick="changeTab('perfil')" id="btn-perfil">👤 Meu Perfil</button>
    <button onclick="changeTab('compras')" id="btn-compras">📦 Meus Pedidos</button>
</nav>

<div class="container">
    <div id="vendas" class="section active">
        <h2>Produtos Disponíveis</h2>
        <p>Olá, <span id="user-welcome" style="color:var(--primary); font-weight:bold;"></span>! Escolha seus itens abaixo:</p>
        <div class="grid-vendas">
            <div class="card">
                <h3>Plano Pro</h3>
                <span class="price">R$ 49,90</span>
                <button class="btn-buy" onclick="adicionarCompra('Plano Pro', 49.90)">Comprar Agora</button>
            </div>
            <div class="card">
                <h3>Consultoria VIP</h3>
                <span class="price">R$ 199,00</span>
                <button class="btn-buy" onclick="adicionarCompra('Consultoria VIP', 199.00)">Comprar Agora</button>
            </div>
            <div class="card">
                <h3>Pack de Templates</h3>
                <span class="price">R$ 29,00</span>
                <button class="btn-buy" onclick="adicionarCompra('Pack de Templates', 29.00)">Comprar Agora</button>
            </div>
        </div>
    </div>

    <div id="perfil" class="section">
        <h2>Meus Dados de Cadastro</h2>
        <div id="dados-cliente" class="info-box"></div>
        <button class="logout" onclick="logout()">Sair da conta</button>
    </div>

    <div id="compras" class="section">
        <h2>Histórico de Compras</h2>
        <div id="lista-pedidos"></div>
    </div>
</div>

<script>
    // 1. Pega o cliente que acabou de se cadastrar
    let clienteAtual = JSON.parse(localStorage.getItem('clienteLogado'));

    // Redireciona se não houver ninguém logado
    if (!clienteAtual) {
        alert("Por favor, faça o cadastro primeiro!");
        window.location.href = "cadastro_cliente.html";
    }

    // Exibe o nome no topo
    document.getElementById('user-welcome').textContent = clienteAtual.nome;

    function changeTab(tabId) {
        // Alterna seções
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        // Alterna botões
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById('btn-' + tabId).classList.add('active-btn');

        if(tabId === 'perfil') mostrarPerfil();
        if(tabId === 'compras') mostrarHistorico();
    }

    function mostrarPerfil() {
        const box = document.getElementById('dados-cliente');
        box.innerHTML = `
            <p><strong>Nome:</strong> ${clienteAtual.nome}</p>
            <p><strong>E-mail:</strong> ${clienteAtual.email}</p>
            <p><strong>Telefone:</strong> ${clienteAtual.telefone}</p>
            <p><strong>Plano Selecionado:</strong> ${clienteAtual.plano}</p>
        `;
    }

    function adicionarCompra(produto, preco) {
        const novaCompra = {
            item: produto,
            valor: preco,
            data: new Date().toLocaleString('pt-BR')
        };

        // 1. Adiciona no objeto do cliente atual
        clienteAtual.compras.push(novaCompra);

        // 2. Atualiza o LocalStorage do cliente logado
        localStorage.setItem('clienteLogado', JSON.stringify(clienteAtual));

        // 3. Atualiza o banco geral (para o ADM ver as compras também)
        let bancoGeral = JSON.parse(localStorage.getItem('bancoGabriel')) || [];
        const index = bancoGeral.findIndex(c => c.id === clienteAtual.id);
        if (index !== -1) {
            bancoGeral[index] = clienteAtual;
            localStorage.setItem('bancoGabriel', JSON.stringify(bancoGeral));
        }

        alert(`Sucesso! Você adquiriu: ${produto}`);
    }

    function mostrarHistorico() {
        const lista = document.getElementById('lista-pedidos');
        if (clienteAtual.compras.length === 0) {
            lista.innerHTML = "<p>Você ainda não realizou nenhuma compra.</p>";
            return;
        }

        lista.innerHTML = "";
        clienteAtual.compras.forEach(p => {
            lista.innerHTML += `
                <div class="info-box" style="border-left-color: var(--success)">
                    <strong>🛍️ ${p.item}</strong><br>
                    <small>Data: ${p.data} | Valor: R$ ${p.valor.toFixed(2)}</small>
                </div>
            `;
        });
    }

    function logout() {
        localStorage.removeItem('clienteLogado');
        window.location.href = "index.html";
    }
</script>

</body>
</html>
