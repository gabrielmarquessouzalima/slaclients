<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéLoja - Centro de Treinadores</title>
    <style>
        :root { --primary: #ff1f1f; --dark: #3b4cca; --light: #f4f7f6; --success: #27ae60; --gold: #ffcb05; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; }
        
        nav { background: var(--dark); padding: 15px; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-bottom: 4px solid var(--gold); }
        nav button { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        nav button:hover, nav button.active-btn { background: var(--primary); border-color: white; }

        .container { max-width: 900px; margin: 30px auto; padding: 20px; }
        .section { display: none; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid de Pokémon */
        .grid-vendas { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 2px solid #eee; padding: 15px; border-radius: 15px; text-align: center; transition: 0.3s; background: #fff; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { width: 120px; height: 120px; }
        .price { color: var(--success); font-weight: bold; font-size: 1.3rem; display: block; margin: 10px 0; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-buy:hover { background: #cc0000; }

        .info-box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--dark); }
        .logout { color: #e74c3c; cursor: pointer; text-decoration: underline; background: none; border: none; margin-top: 20px; }
    </style>
</head>
<body>

<nav id="menu">
    <button onclick="changeTab('vendas')" id="btn-vendas" class="active-btn">🎒 PokéLoja</button>
    <button onclick="changeTab('perfil')" id="btn-perfil">👤 Treinador</button>
    <button onclick="changeTab('compras')" id="btn-compras">🎞️ Minha Coleção</button>
</nav>

<div class="container">
    <div id="vendas" class="section active">
        <h2>Escolha seu Pokémon</h2>
        <p>Olá, Mestre <span id="user-welcome" style="color:var(--dark); font-weight:bold;"></span>! Use suas moedas para capturar:</p>
        
        <div class="grid-vendas">
            <div class="card">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" alt="Bulbasaur">
                <h3>Bulbasaur</h3>
                <span class="price">R$ 120,00</span>
                <button class="btn-buy" onclick="adicionarCompra('Bulbasaur', 120.00)">Capturar</button>
            </div>
            <div class="card">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" alt="Charmander">
                <h3>Charmander</h3>
                <span class="price">R$ 150,00</span>
                <button class="btn-buy" onclick="adicionarCompra('Charmander', 150.00)">Capturar</button>
            </div>
            <div class="card">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png" alt="Squirtle">
                <h3>Squirtle</h3>
                <span class="price">R$ 135,00</span>
                <button class="btn-buy" onclick="adicionarCompra('Squirtle', 135.00)">Capturar</button>
            </div>
            <div class="card">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pikachu">
                <h3>Pikachu</h3>
                <span class="price">R$ 250,00</span>
                <button class="btn-buy" onclick="adicionarCompra('Pikachu', 250.00)">Capturar</button>
            </div>
        </div>
    </div>

    <div id="perfil" class="section">
        <h2>Dados do Treinador</h2>
        <div id="dados-cliente" class="info-box"></div>
        <button class="logout" onclick="logout()">Sair do Centro Pokémon</button>
    </div>

    <div id="compras" class="section">
        <h2>Sua Coleção (Pokédex)</h2>
        <div id="lista-pedidos"></div>
    </div>
</div>

<script>
    let clienteAtual = JSON.parse(localStorage.getItem('clienteLogado'));

    if (!clienteAtual) {
        alert("Acesso negado! Identifique-se primeiro.");
        window.location.href = "cadastro_cliente.html";
    }

    document.getElementById('user-welcome').textContent = clienteAtual.nome;

    function changeTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById('btn-' + tabId).classList.add('active-btn');

        if(tabId === 'perfil') mostrarPerfil();
        if(tabId === 'compras') mostrarHistorico();
    }

    function mostrarPerfil() {
        const box = document.getElementById('dados-cliente');
        box.innerHTML = `
            <p><strong>Nome:</strong> ${clienteAtual.nome}</p>
            <p><strong>E-mail:</strong> ${clienteAtual.email}</p>
            <p><strong>Classe:</strong> Treinador ${clienteAtual.plano}</p>
        `;
    }

    function adicionarCompra(pokemon, preco) {
        const novaCompra = {
            item: pokemon,
            valor: preco,
            data: new Date().toLocaleString('pt-BR')
        };

        clienteAtual.compras.push(novaCompra);
        localStorage.setItem('clienteLogado', JSON.stringify(clienteAtual));

        let bancoGeral = JSON.parse(localStorage.getItem('bancoGabriel')) || [];
        const index = bancoGeral.findIndex(c => c.id === clienteAtual.id);
        if (index !== -1) {
            bancoGeral[index] = clienteAtual;
            localStorage.setItem('bancoGabriel', JSON.stringify(bancoGeral));
        }

        alert(`Temos um novo treinador! Você capturou um ${pokemon}!`);
    }

    function mostrarHistorico() {
        const lista = document.getElementById('lista-pedidos');
        if (clienteAtual.compras.length === 0) {
            lista.innerHTML = "<p>Sua mochila está vazia. Vá capturar alguns Pokémon!</p>";
            return;
        }

        lista.innerHTML = "";
        clienteAtual.compras.forEach(p => {
            lista.innerHTML += `
                <div class="info-box" style="border-left-color: var(--success)">
                    <strong>⭐ ${p.item}</strong><br>
                    <small>Capturado em: ${p.data} | Custo: R$ ${p.valor.toFixed(2)}</small>
                </div>
            `;
        });
    }

    function logout() {
        localStorage.removeItem('clienteLogado');
        window.location.href = "index.html";
    }
</script>
</body>
</html>
