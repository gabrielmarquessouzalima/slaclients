<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <style>
        :root { --primary: #8e44ad; --bg: #1a1a2e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, select { width: 100%; padding: 12px; border: 2px solid #f3e5f5; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; transition: 0.3s; }
        .btn:hover { background: #732d91; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Cadastro de Cliente</h2>
        <form id="formCadastro">
            <input type="text" id="nome" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="Seu melhor E-mail" required>
            <input type="tel" id="telefone" placeholder="Telefone de Contato">
            <select id="tipo">
                <option value="Básico">Plano Básico</option>
                <option value="Premium">Plano Premium</option>
                <option value="Business">Plano Business</option>
            </select>
            <button type="submit" class="btn">Enviar e Ir para Vendas</button>
        </form>
    </div>

    <script>
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const cliente = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value || 'Não informado',
                plano: document.getElementById('tipo').value,
                compras: [] // Lista de compras vazia para novos clientes
            };

            // Salva no banco geral
            let banco = JSON.parse(localStorage.getItem('bancoGabriel')) || [];
            banco.push(cliente);
            localStorage.setItem('bancoGabriel', JSON.stringify(banco));

            // Salva o cliente ATUAL para a tela de vendas saber quem é
            localStorage.setItem('clienteLogado', JSON.stringify(cliente));

            alert("Bem-vindo(a), " + cliente.nome + "!");
            
            // Abre a nova aba de vendas
            window.open("vendas.html", "_blank");
            
            // Opcional: redireciona a atual
            window.location.href = "index.html"; 
        });
    </script>
</body>
</html>
