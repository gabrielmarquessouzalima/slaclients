<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <style>
        :root { --primary: #8e44ad; --bg: #1a1a2e; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; border: 2px solid #f3e5f5; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Cadastro de Cliente</h2>
        <form id="formCadastro">
            <input type="text" id="nome" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="Seu melhor E-mail" required>
            <input type="tel" id="telefone" placeholder="Telefone de Contato">
            <select id="tipo">
                <option value="Básico">Plano Básico</option>
                <option value="Premium">Plano Premium</option>
                <option value="Business">Plano Business</option>
            </select>
            <button type="submit" class="btn">Enviar Cadastro</button>
        </form>
        <p><a href="index.html" style="color: #e74c3c; text-decoration: none; font-weight: bold;">Cancelar</a></p>
    </div>

    <script>
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            const cliente = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value || 'Não informado',
                plano: document.getElementById('tipo').value
            };

            let banco = JSON.parse(localStorage.getItem('bancoGabriel')) || [];
            banco.push(cliente);
            localStorage.setItem('bancoGabriel', JSON.stringify(banco));

            alert("Cadastro realizado com sucesso!");
            window.location.href = "index.html"; // Volta para a inicial após cadastrar
        });
    </script>
</body>
</html>
