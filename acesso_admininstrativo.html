<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso Administrativo</title>
    <style>
        /* Mesmos estilos anteriores para manter a identidade visual */
        :root { --primary: #8e44ad; --dark: #4b0082; --bg: #1a1a2e; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 12px; border: 2px solid #f3e5f5; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; }
        .cliente-item { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--primary); text-align: left; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; float: right; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-area" class="container">
        <h2>Acesso ADM</h2>
        <input type="text" id="login-nome" placeholder="Seu Nome">
        <input type="email" id="login-email" placeholder="Seu E-mail">
        <input type="password" id="login-senha" placeholder="Sua Senha">
        <button class="btn" onclick="validarGabriel()">Validar Acesso</button>
        <p><a href="index.html" style="color: #666;">Voltar</a></p>
    </div>

    <div id="admin-view" class="container hidden" style="max-width: 600px;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2>Painel do Gabriel</h2>
            <button onclick="window.location.href='index.html'" style="color:red; border:none; background:none; cursor:pointer;">Sair</button>
        </div>
        <div id="lista-clientes"></div>
    </div>

    <script>
        const ADM_NOME = "gabriel";
        const ADM_EMAIL = "gabriel.souza.lima12@escola.pr.gov.br";
        const ADM_SENHA = "87791090a";

        function validarGabriel() {
            const n = document.getElementById('login-nome').value.toLowerCase().trim();
            const e = document.getElementById('login-email').value.toLowerCase().trim();
            const s = document.getElementById('login-senha').value;

            if (n === ADM_NOME && e === ADM_EMAIL && s === ADM_SENHA) {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                renderizarLista();
            } else {
                alert("Acesso Negado!");
            }
        }

        function renderizarLista() {
            const box = document.getElementById('lista-clientes');
            const dados = JSON.parse(localStorage.getItem('bancoGabriel')) || [];
            box.innerHTML = dados.length === 0 ? "<p>Ninguém se cadastrou ainda.</p>" : "";
            dados.forEach(c => {
                const div = document.createElement('div');
                div.className = 'cliente-item';
                div.innerHTML = `<button class="btn-delete" onclick="remover(${c.id})">Remover</button>
                                 <strong>👤 ${c.nome}</strong><br><small>📧 ${c.email} | 📞 ${c.telefone}</small>`;
                box.appendChild(div);
            });
        }

        function remover(id) {
            if(confirm("Remover cliente?")) {
                let banco = JSON.parse(localStorage.getItem('bancoGabriel')) || [];
                banco = banco.filter(c => c.id !== id);
                localStorage.setItem('bancoGabriel', JSON.stringify(banco));
                renderizarLista();
            }
        }
    </script>
</body>
</html>
