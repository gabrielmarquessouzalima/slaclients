<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente - Visualização de Dados</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #4b0082 0%, #6a1b9a 100%); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 500px; 
        }

        h2 { color: #4b0082; margin-top: 0; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #4b0082; }
        
        input, select { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 2px solid #f3e5f5; 
            border-radius: 8px; 
            outline: none;
        }

        input:focus { border-color: #8e44ad; }

        .row { display: flex; gap: 15px; }
        
        .btn-enviar { 
            width: 100%; 
            padding: 12px; 
            background-color: #8e44ad; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-enviar:hover { background-color: #4b0082; }

        /* Estilo da Lista e Detalhes */
        .lista-container { margin-top: 30px; border-top: 2px solid #f3e5f5; padding-top: 20px; }
        
        #lista-clientes { list-style: none; padding: 0; }
        
        .cliente-item { 
            background: #fdfaff; 
            padding: 15px; 
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 5px solid #8e44ad;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .cliente-topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .detalhes {
            display: none; /* Escondido por padrão */
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
            font-size: 0.9rem;
            color: #555;
        }

        .detalhes p { margin: 5px 0; }
        .detalhes strong { color: #8e44ad; }

        .tag-plano {
            font-size: 0.7rem;
            background: #8e44ad;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
        }

        .btn-ver {
            font-size: 0.8rem;
            color: #8e44ad;
            background: none;
            border: 1px solid #8e44ad;
            padding: 2px 5px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <form id="formCadastro">
            <h2>Cadastro de Cliente</h2>
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" required>
            </div>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="row">
                <div class="input-group" style="flex: 2;">
                    <label>Telefone</label>
                    <input type="tel" id="telefone">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Plano</label>
                    <select id="tipo">
                        <option value="Básico">Básico</option>
                        <option value="Premium">Premium</option>
                        <option value="Business">Business</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-enviar">Finalizar Cadastro</button>
        </form>

        <div class="lista-container">
            <h3>Clientes Cadastrados</h3>
            <p style="font-size: 0.8rem; color: #888;">Clique no nome para ver os dados.</p>
            <ul id="lista-clientes"></ul>
        </div>
    </div>

    <script>
        const form = document.getElementById('formCadastro');
        const listaUl = document.getElementById('lista-clientes');

        window.onload = () => {
            const salvos = JSON.parse(localStorage.getItem('bancoClientes')) || [];
            salvos.forEach(c => adicionarNaTela(c));
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const novoCliente = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value || 'Não informado',
                plano: document.getElementById('tipo').value
            };

            adicionarNaTela(novoCliente);
            salvar(novoCliente);
            form.reset();
        });

        function adicionarNaTela(cliente) {
            const li = document.createElement('li');
            li.className = 'cliente-item';
            
            li.innerHTML = `
                <div class="cliente-topo" onclick="toggleDetalhes(this)">
                    <strong>${cliente.nome}</strong>
                    <div>
                        <span class="tag-plano">${cliente.plano}</span>
                        <button class="btn-ver">Ver Dados</button>
                    </div>
                </div>
                <div class="detalhes">
                    <p><strong>E-mail:</strong> ${cliente.email}</p>
                    <p><strong>Telefone:</strong> ${cliente.telefone}</p>
                </div>
            `;
            listaUl.appendChild(li);
        }

        function toggleDetalhes(elemento) {
            const abaDetalhes = elemento.nextElementSibling;
            const estaVisivel = abaDetalhes.style.display === 'block';
            abaDetalhes.style.display = estaVisivel ? 'none' : 'block';
        }

        function salvar(cliente) {
            let clientes = JSON.parse(localStorage.getItem('bancoClientes')) || [];
            clientes.push(cliente);
            localStorage.setItem('bancoClientes', JSON.stringify(clientes));
        }
    </script>
</body>
</html>
