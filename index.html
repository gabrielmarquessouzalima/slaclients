<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Gabriel</title>
    <style>
        :root { --primary: #8e44ad; --dark: #4b0082; --bg: #1a1a2e; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, var(--bg) 0%, #16213e 100%); 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container { 
            background: white; padding: 30px; border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 100%; max-width: 400px; text-align: center;
        }
        h2 { color: var(--dark); }
        .btn-escolha { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; 
            cursor: pointer; font-size: 16px; font-weight: bold; text-decoration: none; transition: 0.3s;
            display: inline-block; box-sizing: border-box;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h2>Olá! 👋</h2>
        <p>Selecione o seu tipo de acesso:</p>
        <div class="btn-escolha">
            <a href="acesso_administrativo.html" class="btn btn-primary">Entrar como ADM</a>
            <a href="cadastro_cliente.html" class="btn btn-outline">Entrar como Cliente</a>
        </div>
    </div>
</body>
</html>
