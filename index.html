<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão Segregado</title>
    <style>
        :root {
            --primary: #8e44ad;
            --dark: #4b0082;
            --bg: #1a1a2e;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, var(--bg) 0%, #16213e 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            width: 100%; 
            max-width: 500px; 
        }

        /* Controle de Telas */
        #tela-login, #tela-cadastro, #tela-admin { display: none; }
        .active { display: block !important; }

        h2 { color: var(--dark); text-align: center; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--dark); }
        
        input, select { 
            width: 100%; padding: 12px; border: 2px solid #f3e5f5; 
            border-radius: 8px; outline: none; box-sizing: border-box;
        }

        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; 
            cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--dark); }

        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); margin-top: 15px; }

        /* Lista Admin */
        .cliente-item { 
            background: #f9f9f9; padding: 15px; border-radius: 8px;
            margin-bottom: 10px; border-left: 5px solid var(--primary);
            position: relative;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            float: right;
        }

        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-link { color: var(--danger); cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        
        .badge { background: var(--dark); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="tela-login" class="container active">
        <h2>Entrar no Sistema</h2>
        <div class="input-group">
            <label>Usuário</label>
            <input type="text" id="user-input" placeholder="admin ou cliente">
        </div>
        <div id="campo-senha" class="input-group">
            <label>Senha</label>
            <input type="password" id="pass-input" placeholder="Senha para admin">
        </div>
        <button class="btn btn-primary" onclick="autenticar()">Acessar</button>
    </div>

    <div id="tela-cadastro" class="container">
        <div class="header-painel">
            <h3>Área do Cliente</h3>
            <span class="logout-link" onclick="sair()">Sair</span>
        </div>
        <form id="formCadastro">
            <div class="input-group"><label>Nome</label><input type="text" id="nome" required></div>
            <div class="input-group"><label>E-mail</label><input type="email" id="email" required></div>
            <div class="input-group"><label>Telefone</label><input type="tel" id="telefone"></div>
            <div class="input-group">
                <label>Plano</label>
                <select id="tipo">
                    <option value="Básico">Básico</option>
                    <option value="Premium">Premium</option>
                    <option value="Business">Business</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Enviar Cadastro</button>
        </form>
    </div>

    <div id="tela-admin" class="container" style="max-width: 600px;">
        <div class="header-painel">
            <h2>Painel Admin</h2>
            <span class="logout-link" onclick="sair()">Sair</span>
        </div>
        <div id="lista-clientes"></div>
        <button class="btn btn-outline" onclick="irParaCadastro()">+ Novo Cadastro</button>
    </div>

    <script>
        const SENHA_ADMIN = "123";
        let modoAtual = "";

        // Troca de Telas
        function verTela(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Sistema de Login
        function autenticar() {
            const u = document.getElementById('user-input').value.toLowerCase();
            const p = document.getElementById('pass-input').value;

            if (u === 'admin' && p === SENHA_ADMIN) {
                modoAtual = "admin";
                verTela('tela-admin');
                renderizarLista();
            } else if (u === 'cliente') {
                modoAtual = "cliente";
                verTela('tela-cadastro');
            } else {
                alert("Dados incorretos! (Admin precisa de senha)");
            }
        }

        function sair() {
            modoAtual = "";
            document.getElementById('user-input').value = "";
            document.getElementById('pass-input').value = "";
            verTela('tela-login');
        }

        function irParaCadastro() { verTela('tela-cadastro'); }

        // Manipulação de Dados
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            const cliente = {
                id: Date.now(), // ID único para deletar depois
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value || 'Não informado',
                plano: document.getElementById('tipo').value
            };

            let banco = JSON.parse(localStorage.getItem('bancoDados')) || [];
            banco.push(cliente);
            localStorage.setItem('bancoDados', JSON.stringify(banco));

            alert("Cadastrado com sucesso!");
            this.reset();

            if(modoAtual === 'admin') {
                verTela('tela-admin');
                renderizarLista();
            } else {
                sair();
            }
        });

        function renderizarLista() {
            const box = document.getElementById('lista-clientes');
            const dados = JSON.parse(localStorage.getItem('bancoDados')) || [];
            box.innerHTML = dados.length === 0 ? "<p>Nenhum registro encontrado.</p>" : "";

            dados.forEach(c => {
                const div = document.createElement('div');
                div.className = 'cliente-item';
                div.innerHTML = `
                    <button class="btn-delete" onclick="remover(${c.id})">Apagar</button>
                    <strong>${c.nome}</strong> <span class="badge">${c.plano}</span>
                    <div style="font-size:0.8rem; color:#666; margin-top:5px;">
                        ${c.email} | ${c.telefone}
                    </div>
                `;
                box.appendChild(div);
            });
        }

        function remover(id) {
            if(confirm("Deseja excluir este cliente?")) {
                let banco = JSON.parse(localStorage.getItem('bancoDados')) || [];
                banco = banco.filter(c => c.id !== id);
                localStorage.setItem('bancoDados', JSON.stringify(banco));
                renderizarLista();
            }
        }
    </script>
</body>
</html>
