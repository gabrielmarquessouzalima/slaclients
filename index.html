<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Início</title>
    <style>
        :root {
            --primary: #8e44ad;
            --dark: #4b0082;
            --bg: #1a1a2e;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, var(--bg) 0%, #16213e 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            width: 100%; 
            max-width: 450px; 
            text-align: center;
        }

        /* Telas */
        .tela { display: none; }
        .active { display: block !important; }

        h2 { color: var(--dark); margin-bottom: 20px; }
        
        .btn-escolha {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; 
            cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s;
            box-sizing: border-box;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--dark); transform: scale(1.02); }

        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: #f3e5f5; }

        input { 
            width: 100%; padding: 12px; border: 2px solid #f3e5f5; 
            border-radius: 8px; outline: none; box-sizing: border-box; margin-bottom: 15px;
        }

        .cliente-item { 
            background: #f9f9f9; padding: 15px; border-radius: 8px;
            margin-bottom: 10px; border-left: 5px solid var(--primary);
            text-align: left; position: relative;
        }

        .btn-delete {
            background: var(--danger); color: white; border: none;
            padding: 5px 10px; border-radius: 4px; cursor: pointer;
            font-size: 0.7rem; float: right;
        }

        .logout-link { color: var(--danger); cursor: pointer; display: block; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tela-perfil" class="container active">
        <h2>Bem-vindo!</h2>
        <p>Como você deseja acessar o sistema?</p>
        <div class="btn-escolha">
            <button class="btn btn-primary" onclick="irParaLoginAdmin()">Sou Administrador</button>
            <button class="btn btn-outline" onclick="irParaCadastroCliente()">Sou Cliente</button>
        </div>
    </div>

    <div id="tela-login-admin" class="container">
        <h2>Login Administrativo</h2>
        <input type="password" id="senha-admin" placeholder="Digite a senha (padrão: 123)">
        <button class="btn btn-primary" onclick="validarAdmin()">Entrar</button>
        <button class="btn btn-outline" style="margin-top:10px" onclick="voltarParaPerfil()">Voltar</button>
    </div>

    <div id="tela-cadastro" class="container">
        <h2>Novo Cadastro</h2>
        <form id="formCadastro">
            <input type="text" id="nome" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="tel" id="telefone" placeholder="Telefone">
            <select id="tipo" style="width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #f3e5f5; margin-bottom: 15px;">
                <option value="Básico">Plano Básico</option>
                <option value="Premium">Plano Premium</option>
                <option value="Business">Plano Business</option>
            </select>
            <button type="submit" class="btn btn-primary">Finalizar Cadastro</button>
        </form>
        <span class="logout-link" onclick="voltarParaPerfil()">Cancelar / Voltar</span>
    </div>

    <div id="tela-admin-view" class="container" style="max-width: 600px;">
        <h2>Clientes Cadastrados</h2>
        <div id="lista-clientes"></div>
        <button class="btn btn-outline" onclick="irParaCadastroCliente()">+ Adicionar Novo</button>
        <span class="logout-link" onclick="voltarParaPerfil()">Sair do Sistema</span>
    </div>

    <script>
        const SENHA_CORRETA = "123";
        let modoAdmin = false;

        // Navegação
        function mostrarTela(id) {
            document.querySelectorAll('.tela, .container').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function irParaLoginAdmin() { mostrarTela('tela-login-admin'); }
        
        function irParaCadastroCliente() { mostrarTela('tela-cadastro'); }

        function voltarParaPerfil() { 
            modoAdmin = false;
            document.getElementById('senha-admin').value = "";
            mostrarTela('tela-perfil'); 
        }

        // Lógica Admin
        function validarAdmin() {
            const senha = document.getElementById('senha-admin').value;
            if (senha === SENHA_CORRETA) {
                modoAdmin = true;
                mostrarTela('tela-admin-view');
                renderizarLista();
            } else {
                alert("Senha incorreta!");
            }
        }

        // Lógica de Cadastro
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            const cliente = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value || 'Não informado',
                plano: document.getElementById('tipo').value
            };

            let banco = JSON.parse(localStorage.getItem('dadosSistema')) || [];
            banco.push(cliente);
            localStorage.setItem('dadosSistema', JSON.stringify(banco));

            alert("Cadastro realizado com sucesso!");
            this.reset();

            if(modoAdmin) {
                mostrarTela('tela-admin-view');
                renderizarLista();
            } else {
                voltarParaPerfil();
            }
        });

        function renderizarLista() {
            const box = document.getElementById('lista-clientes');
            const dados = JSON.parse(localStorage.getItem('dadosSistema')) || [];
            box.innerHTML = dados.length === 0 ? "<p>Nenhum cliente no banco.</p>" : "";

            dados.forEach(c => {
                const div = document.createElement('div');
                div.className = 'cliente-item';
                div.innerHTML = `
                    <button class="btn-delete" onclick="remover(${c.id})">Apagar</button>
                    <strong>${c.nome}</strong> <span style="font-size:0.7rem" class="btn-outline">${c.plano}</span>
                    <div style="font-size:0.8rem; color:#666; margin-top:5px;">
                        ${c.email} | ${c.telefone}
                    </div>
                `;
                box.appendChild(div);
            });
        }

        function remover(id) {
            if(confirm("Deseja mesmo excluir?")) {
                let banco = JSON.parse(localStorage.getItem('dadosSistema')) || [];
                banco = banco.filter(c => c.id !== id);
                localStorage.setItem('dadosSistema', JSON.stringify(banco));
                renderizarLista();
            }
        }
    </script>
</body>
</html>
