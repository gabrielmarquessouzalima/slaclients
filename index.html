<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Gabriel</title>
    <style>
        :root {
            --primary: #8e44ad;
            --dark: #4b0082;
            --bg: #1a1a2e;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, var(--bg) 0%, #16213e 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            width: 100%; 
            max-width: 450px; 
            text-align: center;
        }

        /* Controle de Telas */
        .tela { display: none; }
        .active { display: block !important; }

        h2 { color: var(--dark); margin-bottom: 20px; }
        p { color: #666; margin-bottom: 25px; }
        
        .btn-escolha { display: flex; flex-direction: column; gap: 15px; }

        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; 
            cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--dark); transform: translateY(-2px); }

        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: #f3e5f5; }

        input, select { 
            width: 100%; padding: 12px; border: 2px solid #f3e5f5; 
            border-radius: 8px; outline: none; box-sizing: border-box; margin-bottom: 12px;
        }

        .cliente-item { 
            background: #f9f9f9; padding: 15px; border-radius: 8px;
            margin-bottom: 10px; border-left: 5px solid var(--primary);
            text-align: left; position: relative;
        }

        .btn-delete {
            background: var(--danger); color: white; border: none;
            padding: 5px 10px; border-radius: 4px; cursor: pointer;
            font-size: 0.7rem; float: right;
        }

        .logout-link { color: var(--danger); cursor: pointer; display: block; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tela-perfil" class="container active">
        <h2>Olá! 👋</h2>
        <p>Selecione o seu tipo de acesso:</p>
        <div class="btn-escolha">
            <button class="btn btn-primary" onclick="mostrarTela('tela-login-admin')">Entrar como ADM</button>
            <button class="btn btn-outline" onclick="mostrarTela('tela-cadastro')">Entrar como Cliente</button>
        </div>
    </div>

    <div id="tela-login-admin" class="container">
        <h2>Acesso Administrativo</h2>
        <p>Insira suas credenciais oficiais</p>
        <input type="text" id="login-nome" placeholder="Seu Nome">
        <input type="email" id="login-email" placeholder="Seu E-mail">
        <input type="password" id="login-senha" placeholder="Sua Senha">
        <button class="btn btn-primary" onclick="validarGabriel()">Validar Acesso</button>
        <button class="btn btn-outline" style="margin-top:10px" onclick="voltar()">Voltar</button>
    </div>

    <div id="tela-cadastro" class="container">
        <h2>Cadastro de Cliente</h2>
        <form id="formCadastro">
            <input type="text" id="nome" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="Seu melhor E-mail" required>
            <input type="tel" id="telefone" placeholder="Telefone de Contato">
            <select id="tipo">
                <option value="Básico">Plano Básico</option>
                <option value="Premium">Plano Premium</option>
                <option value="Business">Plano Business</option>
            </select>
            <button type="submit" class="btn btn-primary">Enviar Cadastro</button>
        </form>
        <span class="logout-link" onclick="voltar()">Cancelar</span>
    </div>

    <div id="tela-admin-view" class="container" style="max-width: 600px;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0">Painel do Gabriel</h2>
            <span class="logout-link" style="margin:0" onclick="voltar()">Sair</span>
        </div>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <div id="lista-clientes"></div>
    </div>

    <script>
        // CREDENCIAIS DO GABRIEL
        const ADM_NOME = "gabriel";
        const ADM_EMAIL = "gabriel.souza.lima12@escola.pr.gov.br";
        const ADM_SENHA = "87791090a";

        function mostrarTela(id) {
            document.querySelectorAll('.container').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function voltar() {
            document.getElementById('login-nome').value = "";
            document.getElementById('login-email').value = "";
            document.getElementById('login-senha').value = "";
            mostrarTela('tela-perfil');
        }

        // Validação de segurança para o Gabriel
        function validarGabriel() {
            const n = document.getElementById('login-nome').value.toLowerCase().trim();
            const e = document.getElementById('login-email').value.toLowerCase().trim();
            const s = document.getElementById('login-senha').value;

            if (n === ADM_NOME && e === ADM_EMAIL && s === ADM_SENHA) {
                mostrarTela('tela-admin-view');
                renderizarLista();
            } else {
                alert("Acesso Negado! Apenas o Gabriel Souza Lima tem acesso a estes dados.");
            }
        }

        // Lógica de Salvamento
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            const cliente = {
                id: Date.now(),
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value || 'Não informado',
                plano: document.getElementById('tipo').value
            };

            let banco = JSON.parse(localStorage.getItem('bancoGabriel')) || [];
            banco.push(cliente);
            localStorage.setItem('bancoGabriel', JSON.stringify(banco));

            alert("Obrigado pelo cadastro! Seus dados foram enviados.");
            this.reset();
            voltar();
        });

        function renderizarLista() {
            const box = document.getElementById('lista-clientes');
            const dados = JSON.parse(localStorage.getItem('bancoGabriel')) || [];
            box.innerHTML = dados.length === 0 ? "<p>Ninguém se cadastrou ainda.</p>" : "";

            dados.forEach(c => {
                const div = document.createElement('div');
                div.className = 'cliente-item';
                div.innerHTML = `
                    <button class="btn-delete" onclick="remover(${c.id})">Remover</button>
                    <strong>👤 ${c.nome}</strong> 
                    <div style="font-size:0.85rem; color:#555; margin-top:8px;">
                        📧 ${c.email}<br>
                        📞 ${c.telefone}<br>
                        💎 Plano: ${c.plano}
                    </div>
                `;
                box.appendChild(div);
            });
        }

        function remover(id) {
            if(confirm("Gabriel, deseja apagar este cliente da lista?")) {
                let banco = JSON.parse(localStorage.getItem('bancoGabriel')) || [];
                banco = banco.filter(c => c.id !== id);
                localStorage.setItem('bancoGabriel', JSON.stringify(banco));
                renderizarLista();
            }
        }
    </script>
</body>
</html>
