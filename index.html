<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <form class="cadastro-form">
            <h2>Cadastro de Cliente</h2>
            <p>Preencha os dados abaixo para criar a conta.</p>

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                </div>
                <div class="input-group">
                    <label for="tipo">Tipo de Plano</label>
                    <select id="tipo" name="tipo">
                        <option value="basico">Básico</option>
                        <option value="premium">Premium</option>
                        <option value="business">Business</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-enviar">Finalizar Cadastro</button>
        </form>
    </div>

</body>
</html>
