<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente - Total Roxo</title>
    <style>
        /* Fundo Totalmente Roxo */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Degradê de Roxo Escuro para Roxo Médio */
            background: linear-gradient(135deg, #4b0082 0%, #8e44ad 100%); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 450px; 
        }

        h2 { color: #6a11cb; margin-top: 0; }
        p { color: #666; font-size: 0.9rem; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #4b0082; }
        
        input, select { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 2px solid #f3e5f5; 
            border-radius: 8px; 
            outline: none;
            transition: all 0.3s;
        }

        /* Borda roxa ao clicar no campo */
        input:focus { border-color: #8e44ad; box-shadow: 0 0 5px rgba(142, 68, 173, 0.3); }

        .row { display: flex; gap: 15px; }
        
        /* Botão Roxo */
        .btn-enviar { 
            width: 100%; 
            padding: 12px; 
            background-color: #8e44ad; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-enviar:hover { background-color: #6a1b9a; }

        /* Estilo da Lista */
        .lista-container { 
            margin-top: 30px; 
            border-top: 2px solid #f3e5f5; 
            padding-top: 20px; 
        }

        .lista-container h3 { color: #4b0082; font-size: 1.1rem; }
        
        #lista-clientes { list-style: none; padding: 0; }
        
        #lista-clientes li { 
            background: #fdfaff; 
            padding: 12px; 
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-left: 4px solid #8e44ad;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .plano-tag { 
            font-size: 0.7rem; 
            font-weight: bold;
            text-transform: uppercase; 
            background: #f3e5f5; 
            color: #8e44ad; 
            padding: 4px 10px; 
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <form class="cadastro-form" id="formCadastro">
            <h2>Cadastro de Cliente</h2>
            <p>Preencha os dados abaixo para criar a conta.</p>

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>

            <div class="row">
                <div class="input-group" style="flex: 2;">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label for="tipo">Plano</label>
                    <select id="tipo" name="tipo">
                        <option value="Básico">Básico</option>
                        <option value="Premium">Premium</option>
                        <option value="Business">Business</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-enviar">Finalizar Cadastro</button>
        </form>

        <div class="lista-container">
            <h3>Clientes Cadastrados</h3>
            <ul id="lista-clientes">
                </ul>
        </div>
    </div>

    <script>
        const form = document.getElementById('formCadastro');
        const listaUl = document.getElementById('lista-clientes');

        window.onload = () => {
            const salvos = JSON.parse(localStorage.getItem('meusClientes')) || [];
            salvos.forEach(c => adicionarNaTela(c.nome, c.plano));
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const plano = document.getElementById('tipo').value;

            if (nome) {
                adicionarNaTela(nome, plano);
                salvar(nome, plano);
                form.reset();
            }
        });

        function adicionarNaTela(nome, plano) {
            const li = document.createElement('li');
            li.innerHTML = `
                <strong>${nome}</strong> 
                <span class="plano-tag">${plano}</span>
            `;
            listaUl.appendChild(li);
        }

        function salvar(nome, plano) {
            let clientes = JSON.parse(localStorage.getItem('meusClientes')) || [];
            clientes.push({ nome, plano });
            localStorage.setItem('meusClientes', JSON.stringify(clientes));
        }
    </script>

</body>
</html>
